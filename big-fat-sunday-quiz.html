  <link rel="stylesheet" href="style.css" />
  <style>
    .global-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 120;
      padding: 10px 14px 12px;
      background: linear-gradient(90deg, #020713ee, #041831ee);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(150, 208, 255, 0.3);
    }
    .header-row-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { height: 52px; width: auto; filter: drop-shadow(0 0 8px var(--neon)) drop-shadow(0 0 18px var(--neon-soft)); }
    .header-row-bottom { margin-top: 6px; text-align: center; }
    .page-title { margin: 0; font-size: 1.1rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); text-shadow: 0 0 8px var(--neon-soft); }
    .page-date { display: block; margin-top: 2px; font-size: 0.82rem; color: var(--neon-soft); opacity: 0.9; }
    .global-header #menu-btn {
      background: rgba(0,0,0,.25); border: 1.5px solid var(--neon); color: var(--neon);
      font-size: 1.3rem; padding: 6px 12px; border-radius: 12px; cursor: pointer;
      box-shadow: 0 0 10px var(--neon-soft); transition: .18s;
    }
    .global-header #menu-btn:hover { background: var(--neon); color: #001; }
    .menu-dropdown {
      position: absolute; top: 60px; left: 8px; background: var(--bg2);
      border: 1px solid var(--neon); border-radius: 12px; padding: 6px;
      box-shadow: 0 0 18px var(--neon-soft); min-width: 210px;
      display: none; flex-direction: column; z-index: 200;
    }
    .menu-dropdown a { display: block; padding: 10px 12px; color: var(--text); text-decoration: none; border-radius: 10px; font-size: 0.95rem; white-space: nowrap; }
    .menu-dropdown a:hover { background: var(--neon); color: #001; }

    body { padding-top: 140px; }
    main { display: grid; place-items: center; padding: 24px 16px 48px; }
    .quiz-shell { width: min(960px, 100%); }
    .page-subtitle { text-align: center; margin: 0 0 8px; font-size: 1rem; color: var(--neon-soft); opacity: 0.9; }
    .quiz-meta { text-align: center; font-size: 0.85rem; margin-bottom: 14px; opacity: 0.9; }
    .quiz-meta strong { color: var(--neon-soft); }

    .quiz-container { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }

    .question-card {
      background: radial-gradient(circle at top left, #12335a 0, #020a16 55%);
      border-radius: 16px; padding: 14px 14px 12px;
      border: 1px solid rgba(150, 208, 255, 0.35);
      box-shadow: 0 0 12px rgba(0,0,0,0.6), 0 0 18px rgba(55,161,255,0.22);
    }
    .question-card.answered { border-color: rgba(150, 208, 255, 0.15); opacity: 0.85; }

    .question-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; gap: 12px; }
    .question-text { font-size: 0.97rem; font-weight: 500; margin-bottom: 10px; line-height: 1.45; }
    .question-tag { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.6; white-space: nowrap; }

    .options { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 640px) { .options { grid-template-columns: 1fr; } }
    .option-btn {
      border-radius: 999px; border: 1px solid rgba(150, 208, 255, 0.3);
      padding: 8px 14px; font-size: 0.9rem; cursor: pointer;
      background: rgba(3, 15, 34, 0.8); color: #e9f4ff;
      transition: 0.1s ease-out; text-align: left;
    }
    .option-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 0 12px rgba(55,161,255,0.45); border-color: var(--neon-soft); }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct { border-color: var(--good); box-shadow: 0 0 14px rgba(56,239,125,0.6); background: rgba(56,239,125,0.08); }
    .option-btn.wrong { border-color: var(--bad); box-shadow: 0 0 14px rgba(255,66,102,0.6); background: rgba(255,66,102,0.08); }

    .input-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
    .question-input {
      flex: 1; min-width: 160px; padding: 8px 14px; border-radius: 999px;
      border: 1px solid rgba(150,208,255,0.6); background: rgba(0,8,18,0.85);
      color: #e9f4ff; font-size: 0.9rem;
    }
    .question-input:disabled { opacity: 0.6; cursor: default; }

    .btn-check {
      padding: 8px 18px; border-radius: 999px; border: 1px solid rgba(150,208,255,0.7);
      background: rgba(3,15,34,0.95); color: #e9f4ff; font-size: 0.85rem; cursor: pointer; white-space: nowrap;
    }
    .btn-check:disabled { opacity: 0.5; cursor: default; }
    .btn-check:hover:not(:disabled) { background: var(--neon-soft); color: #001; }

    .feedback { margin-top: 8px; font-size: 0.85rem; min-height: 18px; font-weight: 500; }
    .feedback.correct { color: var(--good); }
    .feedback.incorrect { color: var(--bad); }
    .feedback.partial { color: #f5c542; }

    .year-hint { font-size: 0.75rem; opacity: 0.65; margin-top: 3px; }

    .btn-give-up {
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid rgba(255, 100, 100, 0.5);
      background: rgba(3,15,34,0.95); color: rgba(255,120,120,0.9);
      font-size: 0.82rem; cursor: pointer; white-space: nowrap;
    }
    .btn-give-up:hover { background: rgba(255,66,102,0.15); border-color: var(--bad); }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }

    .progress-wrap { max-width: 480px; margin: 0 auto 14px; text-align: left; font-size: 0.85rem; opacity: 0.9; }
    .progress-label { margin-bottom: 4px; display: flex; justify-content: space-between; gap: 8px; }
    .progress-bar-outer { width: 100%; height: 10px; border-radius: 999px; background: rgba(4,20,40,0.9); border: 1px solid rgba(150,208,255,0.5); overflow: hidden; }
    .progress-bar-inner { height: 100%; width: 0%; border-radius: 999px; background: linear-gradient(90deg, var(--neon-soft), var(--good)); box-shadow: 0 0 14px rgba(55,161,255,0.7), 0 0 24px rgba(56,239,125,0.7); transition: width 0.2s ease-out; }

    .btn-secondary { padding: 8px 16px; border-radius: 999px; border: 1px solid rgba(150,208,255,0.6); background: rgba(3,15,34,0.9); color: #e9f4ff; font-size: 0.82rem; cursor: pointer; margin-top: 10px; }
    .btn-secondary:active { transform: translateY(1px); }

    .score-box { margin-top: 14px; text-align: center; font-size: 0.9rem; }
    .score-box .percent { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; color: var(--neon-soft); text-shadow: 0 0 8px var(--neon-soft); }

    .share-panel { margin-top: 12px; flex-direction: column; align-items: center; gap: 8px; }
    .share-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }

    .global-footer { text-align: center; padding: 12px 8px 20px; font-size: 0.85rem; color: var(--neon-soft); opacity: 0.9; }

    @media (max-width: 480px) {
      .header-logo { height: 44px; }
      .page-title { font-size: 0.95rem; }
    }
  </style>
</head>

<body>
  <header class="global-header">
    <div class="header-row-top">
      <div class="header-left">
        <button id="menu-btn">☰</button>
        <img src="logo.png" class="header-logo" alt="Ben's Trivia Logo">
      </div>
    </div>
    <div class="header-row-bottom">
      <h1 class="page-title">The Big Fat Sunday Quiz</h1>
      <span class="page-date" id="page-date"></span>
    </div>
    <nav class="menu-dropdown" id="menu-dropdown">
      <a href="index.html">🎯 Daily Trivia</a>
      <a href="anagram.html">🔤 Anagram Game</a>
      <a href="riddle.html">🕵️ Riddle Game</a>
      <a href="connections.html">🧩 Connections</a>
      <a href="big-fat-sunday-quiz.html">🍻 Big Fat Sunday Quiz</a>
    </nav>
  </header>

  <main>
    <section class="game-card card quiz-shell">
      <p class="page-subtitle">25 questions. One big quiz.</p>
      <div id="quiz-meta" class="quiz-meta">
        <strong id="quiz-title">Big Fat Sunday Quiz</strong><br>
        <span id="quiz-week-info">Loading…</span>
      </div>

      <div class="quiz-container" id="quiz-container"></div>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>Progress</span>
          <span id="progress-text">0 / 0 answered</span>
        </div>
        <div class="progress-bar-outer">
          <div id="progress-bar" class="progress-bar-inner"></div>
        </div>
      </div>

      <button class="btn-secondary" id="jump-unanswered">↓ Jump to first unanswered</button>

      <div class="score-box" id="score-box"></div>

      <div class="share-panel" id="share-panel" style="display:none;">
        <div class="share-buttons">
          <button class="btn-secondary" id="share-whatsapp">Share via WhatsApp</button>
          <button class="btn-secondary" id="copy-result">Copy result</button>
        </div>
        <div id="share-status" style="font-size:11px;opacity:0.8;margin-top:6px;"></div>
      </div>
    </section>
  </main>

  <footer class="global-footer" id="footer-text"></footer>

<script>
/* ---- HEADER / FOOTER ---- */
(function() {
  const today = new Date();
  const opts = { weekday:"long", day:"numeric", month:"long" };
  document.getElementById("page-date").textContent = today.toLocaleDateString(undefined, opts);
  document.getElementById("footer-text").textContent =
    "Made by Ben · " + today.toLocaleDateString(undefined, { ...opts, year:"numeric" });
})();

const menuBtn = document.getElementById("menu-btn");
const menuDropdown = document.getElementById("menu-dropdown");
menuBtn.addEventListener("click", () => {
  menuDropdown.style.display = menuDropdown.style.display === "flex" ? "none" : "flex";
});
document.addEventListener("click", e => {
  if (!menuDropdown.contains(e.target) && !menuBtn.contains(e.target))
    menuDropdown.style.display = "none";
});

/* ---- STATE ---- */
let questions = [];
let states = [];

const container = document.getElementById("quiz-container");
const scoreBox  = document.getElementById("score-box");
const progText  = document.getElementById("progress-text");
const progBar   = document.getElementById("progress-bar");

/* ================================================================
   ANSWER MATCHING — fuzzy + acceptedAnswers
   ================================================================ */

/* Levenshtein distance between two strings */
function levenshtein(a, b) {
  const dp = Array.from({ length: a.length + 1 }, (_, i) =>
    Array.from({ length: b.length + 1 }, (_, j) => i || j));
  for (let i = 1; i <= a.length; i++)
    for (let j = 1; j <= b.length; j++)
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[a.length][b.length];
}

/* Returns true if the player's input matches a single target string */
function fuzzyMatch(input, target) {
  if (input === target) return true;
  /* substring containment — handles "the cheetah" matching "cheetah" */
  if (input.includes(target) || target.includes(input)) return true;
  /* allow 1 typo for words up to 6 chars, 2 typos for longer */
  const tolerance = target.length > 6 ? 2 : 1;
  return levenshtein(input, target) <= tolerance;
}

/* Main check: tests the player's input against all accepted answers */
function isCorrect(val, q) {
  const input = val.trim().toLowerCase();
  /* build list: acceptedAnswers array takes priority, falls back to correctAnswer */
  const accepted = (q.acceptedAnswers && q.acceptedAnswers.length > 0)
    ? q.acceptedAnswers.map(a => a.toLowerCase())
    : [q.correctAnswer.toLowerCase()];
  return accepted.some(target => fuzzyMatch(input, target));
}

/* ---- LOAD QUIZ ---- */
(async function loadQuiz() {
  try {
    const res  = await fetch("weekly_quizzes.json");
    const data = await res.json();

    const start    = new Date(data.start_date);
    const diffDays = Math.floor((Date.now() - start) / 86400000);
    const weekIdx  = Math.min(Math.floor(diffDays / 7), data.weekly_quizzes.length - 1);
    const quiz     = data.weekly_quizzes[weekIdx];

    questions = quiz.questions;
    document.getElementById("quiz-title").textContent = quiz.title;
    document.getElementById("quiz-week-info").textContent =
      `Week ${weekIdx + 1} · ${questions.length} questions`;

    states = questions.map(q => ({ checked: false, points: 0, maxPoints: q.maxPoints || 1 }));
    renderQuiz();
    updateProgress();
  } catch(err) {
    console.error("Failed to load quiz:", err);
    document.getElementById("quiz-week-info").textContent = "Error loading quiz – check console.";
  }
})();

/* ---- RENDER ---- */
function renderQuiz() {
  container.innerHTML = "";
  questions.forEach((q, i) => {
    const card = document.createElement("div");
    card.className = "question-card";
    card.id = `card-${i}`;

    const header = document.createElement("div");
    header.className = "question-header";
    header.innerHTML = `<span style="font-size:0.78rem;opacity:0.6;">Q${i+1} of ${questions.length}</span><span class="question-tag">${q.tag || ""}</span>`;
    card.appendChild(header);

    const txt = document.createElement("div");
    txt.className = "question-text";
    txt.textContent = q.text;
    card.appendChild(txt);

    if      (q.type === "mcq")        renderMCQ(card, q, i);
    else if (q.type === "text-exact") renderTextExact(card, q, i);
    else if (q.type === "numeric")    renderNumeric(card, q, i);
    else if (q.type === "year")       renderYear(card, q, i);

    const fb = document.createElement("div");
    fb.id = `feedback-${i}`;
    fb.className = "feedback";
    card.appendChild(fb);

    container.appendChild(card);
  });
}

function renderMCQ(card, q, i) {
  const grid = document.createElement("div");
  grid.className = "options";
  q.options.forEach((opt, oi) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.textContent = opt;
    btn.onclick = () => checkMCQ(i, oi);
    grid.appendChild(btn);
  });
  card.appendChild(grid);
}

function renderTextExact(card, q, i) {
  const row = document.createElement("div");
  row.className = "input-row";
  const input = document.createElement("input");
  input.type = "text";
  input.className = "question-input";
  input.id = `input-${i}`;
  input.placeholder = "Type your answer…";
  input.addEventListener("keydown", e => { if (e.key === "Enter") checkTextExact(i); });
  const btn = document.createElement("button");
  btn.className = "btn-check";
  btn.id = `btn-${i}`;
  btn.textContent = "Check";
  btn.onclick = () => checkTextExact(i);
  const giveUp = document.createElement("button");
  giveUp.className = "btn-give-up";
  giveUp.id = `giveup-${i}`;
  giveUp.textContent = "Give up";
  giveUp.style.display = "none";
  giveUp.onclick = () => giveUpTextExact(i);
  row.appendChild(input);
  row.appendChild(btn);
  row.appendChild(giveUp);
  card.appendChild(row);
}

function renderNumeric(card, q, i) {
  const row = document.createElement("div");
  row.className = "input-row";
  const input = document.createElement("input");
  input.type = "number";
  input.className = "question-input";
  input.id = `input-${i}`;
  input.placeholder = "Enter number…";
  input.addEventListener("keydown", e => { if (e.key === "Enter") checkNumeric(i); });
  const btn = document.createElement("button");
  btn.className = "btn-check";
  btn.id = `btn-${i}`;
  btn.textContent = "Check";
  btn.onclick = () => checkNumeric(i);
  row.appendChild(input);
  row.appendChild(btn);
  card.appendChild(row);
}

function renderYear(card, q, i) {
  const hint = document.createElement("div");
  hint.className = "year-hint";
  hint.textContent = "Exact year = 2 pts · 1 year off = 1 pt";
  card.appendChild(hint);

  const row = document.createElement("div");
  row.className = "input-row";
  const input = document.createElement("input");
  input.type = "number";
  input.className = "question-input";
  input.id = `input-${i}`;
  input.placeholder = "Enter year…";
  input.addEventListener("keydown", e => { if (e.key === "Enter") checkYear(i); });
  const btn = document.createElement("button");
  btn.className = "btn-check";
  btn.id = `btn-${i}`;
  btn.textContent = "Check";
  btn.onclick = () => checkYear(i);
  row.appendChild(input);
  row.appendChild(btn);
  card.appendChild(row);
}

/* ---- CHECK FUNCTIONS ---- */
function lockCard(i) {
  const card = document.getElementById(`card-${i}`);
  card.querySelectorAll("input, button.option-btn, button.btn-check").forEach(el => el.disabled = true);
  card.classList.add("answered");
  states[i].checked = true;
  updateProgress();
}

function setFeedback(i, msg, type) {
  const fb = document.getElementById(`feedback-${i}`);
  fb.textContent = msg;
  fb.className = `feedback ${type}`;
}

function checkMCQ(i, chosen) {
  if (states[i].checked) return;
  const q = questions[i];
  const card = document.getElementById(`card-${i}`);
  const btns = card.querySelectorAll(".option-btn");
  btns.forEach((btn, bi) => {
    if (bi === q.correctIndex)  btn.classList.add("correct");
    else if (bi === chosen)     btn.classList.add("wrong");
  });
  if (chosen === q.correctIndex) {
    states[i].points = q.maxPoints;
    setFeedback(i, "✓ Correct!", "correct");
  } else {
    setFeedback(i, `✗ The answer was: ${q.options[q.correctIndex]}`, "incorrect");
  }
  lockCard(i);
}

function checkTextExact(i) {
  if (states[i].checked) return;
  const q = questions[i];
  const input = document.getElementById(`input-${i}`);
  const val = input.value;

  if (!val.trim()) { setFeedback(i, "Please type an answer first.", ""); return; }

  if (isCorrect(val, q)) {
    states[i].points = q.maxPoints;
    setFeedback(i, "\u2713 Correct!", "correct");
    const giveUp = document.getElementById(`giveup-${i}`);
    if (giveUp) giveUp.style.display = "none";
    lockCard(i);
  } else {
    setFeedback(i, "\u2717 Not quite \u2014 try again!", "incorrect");
    input.value = "";
    input.focus();
    input.classList.add("shake");
    setTimeout(() => input.classList.remove("shake"), 400);
    const giveUp = document.getElementById(`giveup-${i}`);
    if (giveUp) giveUp.style.display = "inline-block";
  }
}

function giveUpTextExact(i) {
  if (states[i].checked) return;
  const q = questions[i];
  setFeedback(i, `Answer: ${q.correctAnswer}`, "incorrect");
  states[i].points = 0;
  lockCard(i);
}

function checkNumeric(i) {
  if (states[i].checked) return;
  const q = questions[i];
  const input = document.getElementById(`input-${i}`);
  const val = parseFloat(input.value);

  if (isNaN(val)) { setFeedback(i, "Please enter a number.", ""); return; }

  if (val === q.correctNumber) {
    states[i].points = q.maxPoints;
    setFeedback(i, "✓ Correct!", "correct");
  } else {
    setFeedback(i, `✗ The answer was: ${q.correctNumber}`, "incorrect");
  }
  lockCard(i);
}

function checkYear(i) {
  if (states[i].checked) return;
  const q = questions[i];
  const input = document.getElementById(`input-${i}`);
  const val = parseInt(input.value, 10);

  if (isNaN(val)) { setFeedback(i, "Please enter a year.", ""); return; }

  const diff = Math.abs(val - q.correctYear);
  let pts = 0;
  if (diff === 0)      pts = 2;
  else if (diff === 1) pts = 1;

  states[i].points = pts;

  if (diff === 0) {
    setFeedback(i, `✓ Correct! ${q.correctYear} — full 2 points!`, "correct");
  } else if (diff === 1) {
    setFeedback(i, `Almost! The answer was ${q.correctYear} — 1 point.`, "partial");
  } else {
    setFeedback(i, `✗ The answer was: ${q.correctYear}`, "incorrect");
  }
  lockCard(i);
}

/* ---- PROGRESS + SCORE ---- */
function updateProgress() {
  const answered = states.filter(s => s.checked).length;
  const total    = states.length;
  const earned   = states.reduce((s, x) => s + x.points, 0);
  const maxPts   = states.reduce((s, x) => s + x.maxPoints, 0);
  const pct      = maxPts ? Math.round((earned / maxPts) * 100) : 0;

  progText.textContent = `${answered} / ${total} answered`;
  progBar.style.width  = total ? (answered / total * 100) + "%" : "0%";

  scoreBox.innerHTML = `
    <div class="percent">${pct}%</div>
    <div>${earned} / ${maxPts} points &nbsp;·&nbsp; ${answered} / ${total} answered</div>
  `;

  if (answered === total && total > 0) {
    document.getElementById("share-panel").style.display = "flex";
  }
}

/* ---- JUMP TO UNANSWERED ---- */
document.getElementById("jump-unanswered").addEventListener("click", () => {
  const idx = states.findIndex(s => !s.checked);
  if (idx === -1) scoreBox.scrollIntoView({ behavior: "smooth" });
  else document.getElementById(`card-${idx}`).scrollIntoView({ behavior: "smooth", block: "center" });
});

/* ---- SHARE ---- */
function buildShareText() {
  const earned = states.reduce((s, x) => s + x.points, 0);
  const maxPts = states.reduce((s, x) => s + x.maxPoints, 0);
  const pct    = maxPts ? Math.round((earned / maxPts) * 100) : 0;
  const title  = document.getElementById("quiz-title").textContent;
  return `${title}\n${earned}/${maxPts} (${pct}%)\nhttps://benjy333.github.io/Bens-Trivia/big-fat-sunday-quiz.html`;
}

document.getElementById("share-whatsapp").addEventListener("click", () => {
  window.open("https://wa.me/?text=" + encodeURIComponent(buildShareText()), "_blank");
});

document.getElementById("copy-result").addEventListener("click", () => {
  navigator.clipboard.writeText(buildShareText()).then(() => {
    document.getElementById("share-status").textContent = "Copied!";
    setTimeout(() => document.getElementById("share-status").textContent = "", 2000);
  });
