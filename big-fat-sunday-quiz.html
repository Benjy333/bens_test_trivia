    }

    }
    .page-title {

      letter-spacing: 0.06em;

      text-shadow: 0 0 8px var(--neon-soft);

    .page-date {

    // ------------- STATE -------------
    const questionStates = questions.map(q => ({
      checked: false,
      points: 0,
      maxPoints: q.maxPoints
    }));

    const quizContainer = document.getElementById("quiz-container");
    const scoreBox = document.getElementById("score-box");
    const sharePanel = document.getElementById("share-panel");
    const shareStatus = document.getElementById("share-status");
    const progressTextEl = document.getElementById("progress-text");
    const progressBarEl = document.getElementById("progress-bar");
    const jumpUnansweredBtn = document.getElementById("jump-unanswered");

    const TOTAL_QUESTIONS = questions.length;
    const MAX_POINTS = questionStates.reduce((sum, s) => sum + s.maxPoints, 0);

    // ------------- RENDERING -------------
    function renderQuiz() {
      quizContainer.innerHTML = "";
      questions.forEach((q, index) => {
        const card = document.createElement("article");
        card.className = "question-card";
        card.id = `card-${index}`;

        const header = document.createElement("div");
        header.className = "question-header";

        const qNumber = document.createElement("div");
        qNumber.className = "question-number";
        qNumber.textContent = `Question ${index + 1}`;

        const qText = document.createElement("div");
        qText.className = "question-text";
        qText.textContent = q.text;

        header.appendChild(qNumber);
        header.appendChild(qText);

        if (q.tag) {
          const tag = document.createElement("div");
          tag.className = "question-tag";
          tag.textContent = q.tag;
          header.appendChild(tag);
        }

        card.appendChild(header);

        // type-specific UI
        if (q.type === "mcq") {
          const optionsWrap = document.createElement("div");
          optionsWrap.className = "options";
          q.options.forEach((optText, optIndex) => {
            const id = `q${index}_opt${optIndex}`;
            const label = document.createElement("label");
            label.className = "option-label";
            label.setAttribute("for", id);
            label.dataset.q = index;
            label.dataset.opt = optIndex;

            const input = document.createElement("input");
            input.type = "radio";
            input.name = `q${index}`;
            input.id = id;
            input.value = optIndex;

            const span = document.createElement("span");
            span.textContent = optText;

            label.appendChild(input);
            label.appendChild(span);
            optionsWrap.appendChild(label);
          });
          card.appendChild(optionsWrap);
        } else if (q.type === "text-exact" || q.type === "numeric" || q.type === "year") {
          const input = document.createElement("input");
          input.type = "text";
          input.className = "question-input";
          input.id = `input-${index}`;
          input.placeholder = (q.type === "year" || q.type === "numeric") ? "Enter a number…" : "Type your answer…";
          card.appendChild(input);
        } else if (q.type === "self-text-image") {
          if (q.image) {
            const imgWrap = document.createElement("div");
            imgWrap.className = "image-wrap";
            const img = document.createElement("img");
            img.src = q.image;
            img.alt = "Question image";
            imgWrap.appendChild(img);
            card.appendChild(imgWrap);
          }
          const input = document.createElement("input");
          input.type = "text";
          input.className = "question-input";
          input.id = `input-${index}`;
          input.placeholder = "Type your guess (you'll self-mark)…";
          card.appendChild(input);
          const hint = document.createElement("div");
          hint.className = "small-hint";
          hint.textContent = "Tap 'Reveal answer' then choose if you were right.";
          card.appendChild(hint);
        } else if (q.type === "list-manual") {
          const hint = document.createElement("div");
          hint.className = "small-hint";
          hint.textContent = "Write your answers first. Reveal the list, then enter how many you got right (1 point per planet).";
          card.appendChild(hint);
        } else if (q.type === "rank") {
          const box = document.createElement("div");
          box.className = "rank-box";
          q.items.forEach((labelText, i) => {
            const row = document.createElement("div");
            row.className = "rank-row";
            row.innerHTML = `
              <input type="number" min="1" max="${q.items.length}" class="rank-input" data-index="${i}">
              <span class="rank-label">${labelText}</span>
            `;
            box.appendChild(row);
          });
          card.appendChild(box);
        }

        // buttons
        if (q.type === "self-text-image" || q.type === "list-manual") {
          const revealBtn = document.createElement("button");
          revealBtn.className = "btn-question";
          revealBtn.type = "button";
          revealBtn.textContent = "Reveal answer";
          revealBtn.addEventListener("click", () => revealSelfMarked(index));
          card.appendChild(revealBtn);
        } else {
          const checkBtn = document.createElement("button");
          checkBtn.className = "btn-question";
          checkBtn.type = "button";
          checkBtn.textContent = "Check answer";
          checkBtn.addEventListener("click", () => checkStandardQuestion(index));
          card.appendChild(checkBtn);
        }

        const feedback = document.createElement("div");
        feedback.className = "feedback";
        feedback.id = `feedback-${index}`;
        card.appendChild(feedback);

        if (q.type === "self-text-image") {
          const selfButtons = document.createElement("div");
          selfButtons.className = "manual-score-wrap";
          const correctBtn = document.createElement("button");
          correctBtn.type = "button";
          correctBtn.className = "btn-secondary";
          correctBtn.textContent = "I got it right";
          correctBtn.addEventListener("click", () => {
            questionStates[index].checked = true;
            questionStates[index].points = q.maxPoints;
            feedback.textContent = `Nice! You’ve given yourself ${q.maxPoints} point${q.maxPoints !== 1 ? "s" : ""}.`;
            feedback.classList.remove("incorrect");
            feedback.classList.add("correct");
            updateScoreAndProgress();
          });
          const wrongBtn = document.createElement("button");
          wrongBtn.type = "button";
          wrongBtn.className = "btn-secondary";
          wrongBtn.textContent = "I got it wrong";
          wrongBtn.addEventListener("click", () => {
            questionStates[index].checked = true;
            questionStates[index].points = 0;
            feedback.textContent = "Marked as 0 points.";
            feedback.classList.remove("correct");
            feedback.classList.add("incorrect");
            updateScoreAndProgress();
          });
          selfButtons.appendChild(correctBtn);
          selfButtons.appendChild(wrongBtn);
          card.appendChild(selfButtons);
        } else if (q.type === "list-manual") {
          const manual = document.createElement("div");
          manual.className = "manual-score-wrap";
          manual.innerHTML = `
            <span>How many did you get right?</span>
            <input type="number" min="0" max="${q.maxPoints}" id="manual-${index}" value="0" />
            <button type="button" class="btn-secondary">Save score</button>
          `;
          const btn = manual.querySelector("button");
          btn.addEventListener("click", () => {
            const inputEl = manual.querySelector("input");
            let val = parseInt(inputEl.value, 10);
            if (isNaN(val) || val < 0) val = 0;
            if (val > q.maxPoints) val = q.maxPoints;
            inputEl.value = val;
            questionStates[index].checked = true;
            questionStates[index].points = val;
            feedback.textContent = `Saved ${val} point${val !== 1 ? "s" : ""} for this question.`;
            feedback.classList.remove("incorrect");
            feedback.classList.add("correct");
            updateScoreAndProgress();
          });
          card.appendChild(manual);
        }

        quizContainer.appendChild(card);
      });
    }

    renderQuiz();

    // ------------- CHECKING LOGIC -------------
    function checkStandardQuestion(index) {
      const q = questions[index];
      const feedback = document.getElementById(`feedback-${index}`);
      const card = document.getElementById(`card-${index}`);
      feedback.classList.remove("correct", "incorrect");

      if (q.type === "mcq") {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const labels = document.querySelectorAll(`label.option-label[data-q="${index}"]`);
        labels.forEach(l => l.classList.remove("correct", "chosen-wrong"));

        if (!selected) {
          feedback.textContent = "Choose an answer first 😊";
          return;
        }
        const chosen = Number(selected.value);
        const correct = q.correctIndex;

        labels.forEach(label => {
          const opt = Number(label.dataset.opt);
          if (opt === correct) {
            label.classList.add("correct");
          } else if (opt === chosen && chosen !== correct) {
            label.classList.add("chosen-wrong");
          }
        });

        if (chosen === correct) {
          feedback.textContent = "Correct! 🎉";
          feedback.classList.add("correct");
          questionStates[index].points = q.maxPoints;
        } else {
          feedback.textContent = `Incorrect – correct answer: ${q.options[correct]}`;
          feedback.classList.add("incorrect");
          questionStates[index].points = 0;
        }
        questionStates[index].checked = true;
      } else if (q.type === "text-exact") {
        const input = document.getElementById(`input-${index}`);
        const normalise = (str) =>
          (str || "").toLowerCase().replace(/[^a-z0-9]/g, "").trim();
        const user = normalise(input.value);
        const correct = normalise(q.correctAnswer);
        if (!user) {
          feedback.textContent = "Type an answer first 😊";
          return;
        }
        if (user === correct) {
          feedback.textContent = "Correct! 🎉";
          feedback.classList.add("correct");
          questionStates[index].points = q.maxPoints;
        } else {
          feedback.textContent = `Incorrect – correct answer: ${q.correctAnswer}`;
          feedback.classList.add("incorrect");
          questionStates[index].points = 0;
        }
        questionStates[index].checked = true;
      } else if (q.type === "numeric") {
        const input = document.getElementById(`input-${index}`);
        const val = parseInt(input.value, 10);
        if (isNaN(val)) {
          feedback.textContent = "Enter a number first 😊";
          return;
        }
        if (val === q.correctNumber) {
          feedback.textContent = "Correct! 🎉";
          feedback.classList.add("correct");
          questionStates[index].points = q.maxPoints;
        } else {
          feedback.textContent = `Incorrect – correct answer: ${q.correctNumber}`;
          feedback.classList.add("incorrect");
          questionStates[index].points = 0;
        }
        questionStates[index].checked = true;
      } else if (q.type === "year") {
        const input = document.getElementById(`input-${index}`);
        const val = parseInt(input.value, 10);
        if (isNaN(val)) {
          feedback.textContent = "Enter a year first 😊";
          return;
        }
        const diff = Math.abs(val - q.correctYear);
        let pts = 0;
        if (diff === 0) pts = 2;
        else if (diff === 1) pts = 1;

        if (pts === 2) {
          feedback.textContent = "Bang on! 🎉 +2 points";
          feedback.classList.add("correct");
        } else if (pts === 1) {
          feedback.textContent = `Close! The correct year is ${q.correctYear}. +1 point`;
          feedback.classList.add("correct");
        } else {
          feedback.textContent = `Incorrect – correct year: ${q.correctYear}`;
          feedback.classList.add("incorrect");
        }
        questionStates[index].points = pts;
        questionStates[index].checked = true;
      } else if (q.type === "rank") {
        const inputs = card.querySelectorAll(".rank-input");
        let allValid = true;
        let correct = true;

        inputs.forEach((input, i) => {
          const val = Number(input.value);
          if (!val || val < 1 || val > q.items.length) allValid = false;
          if (val !== q.correctRanks[i]) correct = false;
        });

        if (!allValid) {
          feedback.textContent = `Enter numbers 1–${q.items.length} beside each title.`;
          feedback.classList.add("incorrect");
          return;
        }

        if (correct) {
          feedback.textContent = "Correct! 🎉";
          feedback.classList.add("correct");
          questionStates[index].points = q.maxPoints;
        } else {
          feedback.textContent = "Not quite – the correct order is 1) Lord of the Rings, 2) Harry Potter, 3) King James Bible.";
          feedback.classList.add("incorrect");
          questionStates[index].points = 0;
        }
        questionStates[index].checked = true;
      }

      updateScoreAndProgress();
    }

    function revealSelfMarked(index) {
      const q = questions[index];
      const feedback = document.getElementById(`feedback-${index}`);
      feedback.classList.remove("correct", "incorrect");
      if (q.type === "list-manual") {
        feedback.textContent = `Planets with rings: ${q.correctItems.join(", ")}.`;
      } else {
        feedback.textContent = `Answer: ${q.answerText}`;
      }
    }

    // ------------- SCORE + PROGRESS -------------
    let lastPoints = 0;
    let lastPercent = 0;

    function updateScoreAndProgress() {
      const totalPoints = questionStates.reduce((sum, s) => sum + s.points, 0);
      const answered = questionStates.reduce((count, s) => count + (s.checked ? 1 : 0), 0);
      const progressPercent = Math.round((answered / TOTAL_QUESTIONS) * 100);
      const percentScore = Math.round((totalPoints / MAX_POINTS) * 100);

      lastPoints = totalPoints;
      lastPercent = percentScore;

      progressTextEl.textContent = `${answered} / ${TOTAL_QUESTIONS} questions checked`;
      progressBarEl.style.width = progressPercent + "%";

      scoreBox.innerHTML = `
        <div class="percent">${percentScore}%</div>
        <div class="raw">Currently ${totalPoints} out of ${MAX_POINTS} points</div>
      `;

      if (answered > 0) {
        sharePanel.style.display = "flex";
      } else {
        sharePanel.style.display = "none";
      }
    }

    updateScoreAndProgress();

    // UNANSWERED BUTTON
    jumpUnansweredBtn.addEventListener("click", () => {
      let targetIndex = questionStates.findIndex(s => !s.checked);
      if (targetIndex === -1) {
        shareStatus.textContent = "You've checked every question – nice! 🎉";
        sharePanel.style.display = "flex";
        return;
      }
      const card = document.getElementById(`card-${targetIndex}`);
      if (card) {
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        card.style.outline = "2px solid var(--neon)";
        setTimeout(() => { card.style.outline = "none"; }, 1400);
      }
    });

    // SHARING
    const shareWhatsAppBtn = document.getElementById("share-whatsapp");
    const copyResultBtn = document.getElementById("copy-result");

    function buildShareText() {
      const baseLines = [
        `I just played "The Big Fat Sunday Quiz" on Ben's Trivia!`,
        ``,
        `My score: ${lastPoints}/${MAX_POINTS} (${lastPercent}%)`,
        ``,
        `Try to beat my score:`,
        window.location.href
      ];
      return baseLines.join("\n");
    }

    shareWhatsAppBtn.addEventListener("click", () => {
      const text = buildShareText();
      const url = "https://wa.me/?text=" + encodeURIComponent(text);
      window.open(url, "_blank");
    });

    copyResultBtn.addEventListener("click", async () => {
      const text = buildShareText();
      try {
        await navigator.clipboard.writeText(text);
        shareStatus.textContent = "Copied! Paste into Messenger, Instagram, SMS, etc.";
      } catch (err) {
        shareStatus.textContent = "Couldn't copy automatically – select and copy manually.";
      }
    });
  </script>
</body>
